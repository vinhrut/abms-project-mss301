server:
  port: 8082

spring:
  application:
    name: apartment-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/abms_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password123}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
