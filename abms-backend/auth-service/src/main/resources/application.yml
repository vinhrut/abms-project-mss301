server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/abms_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password123}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

jwt:
  secret: ${JWT_SECRET:DayLaChuoiSecretKeyCuaDuAnABMSCanPhaiDaiHon256Bits}

services:
  apartment-service:
    url: ${APARTMENT_SERVICE_URL:http://localhost:8082}
