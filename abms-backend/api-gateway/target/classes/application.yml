server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: auth-service-users
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
        - id: apartment-service-buildings
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/buildings/**
        - id: apartment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/apartments/**
        - id: vehicle-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/vehicles/**
        - id: maintenance-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/maintenance-requests/**

jwt:
  secret: DayLaChuoiSecretKeyCuaDuAnABMSCanPhaiDaiHon256Bits
