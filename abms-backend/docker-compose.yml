services:
  postgres:
    image: postgres:15
    container_name: abms-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-abms_db}
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d abms_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - abms-network

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: auth-service
        PORT: 8081
    container_name: abms-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms64m -Xmx256m}"
      DB_URL: jdbc:postgresql://postgres:5432/abms_db
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      APARTMENT_SERVICE_URL: http://apartment-service:8082
      JWT_SECRET: ${JWT_SECRET:-DayLaChuoiSecretKeyCuaDuAnABMSCanPhaiDaiHon256Bits}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - abms-network

  apartment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: apartment-service
        PORT: 8082
    container_name: abms-apartment-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms64m -Xmx256m}"
      DB_URL: jdbc:postgresql://postgres:5432/abms_db
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - abms-network

  vehicle-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: vehicle-service
        PORT: 8083
    container_name: abms-vehicle-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms64m -Xmx256m}"
      DB_URL: jdbc:postgresql://postgres:5432/abms_db
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      APARTMENT_SERVICE_URL: http://apartment-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      apartment-service:
        condition: service_started
    networks:
      - abms-network

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: notification-service
        PORT: 8084
    container_name: abms-notification-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms64m -Xmx256m}"
      DB_URL: ${NOTIFICATION_DB_URL:-jdbc:sqlserver://host.docker.internal:1433;databaseName=abms_db_notification;encrypt=true;trustServerCertificate=true}
      DB_USERNAME: ${NOTIFICATION_DB_USERNAME:-sa1}
      DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-123456}
    networks:
      - abms-network

  report-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: report-service
        PORT: 8085
    container_name: abms-report-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms64m -Xmx256m}"
      DB_URL: ${REPORT_DB_URL:-jdbc:sqlserver://host.docker.internal:1433;databaseName=abms_db_report;encrypt=true;trustServerCertificate=true}
      DB_USERNAME: ${REPORT_DB_USERNAME:-sa1}
      DB_PASSWORD: ${REPORT_DB_PASSWORD:-123456}
    networks:
      - abms-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
        PORT: 8080
    container_name: abms-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--Xms64m -Xmx256m}"
      AUTH_SERVICE_URL: http://auth-service:8081
      APARTMENT_SERVICE_URL: http://apartment-service:8082
      VEHICLE_SERVICE_URL: http://vehicle-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      REPORT_SERVICE_URL: http://report-service:8085
      JWT_SECRET: ${JWT_SECRET:-DayLaChuoiSecretKeyCuaDuAnABMSCanPhaiDaiHon256Bits}
    depends_on:
      - auth-service
      - apartment-service
      - vehicle-service
      - notification-service
      - report-service
    networks:
      - abms-network

volumes:
  postgres-data:

networks:
  abms-network:
    driver: bridge
