services:
  auth-db:
    image: postgres:15
    container_name: abms-auth-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - abms-network

  apartment-db:
    image: postgres:15
    container_name: abms-apartment-db
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: apartment_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
