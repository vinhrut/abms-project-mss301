server.port=${SERVER_PORT:8085}

spring.application.name=report-service

# The report service owns a SQL Server connection.  REPORT_DB_* takes
# precedence, while DB_* remains supported by docker-compose and local runs.
spring.datasource.url=${REPORT_DB_URL:${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=abms_db_report;encrypt=true;trustServerCertificate=true}}
spring.datasource.username=${REPORT_DB_USERNAME:${DB_USERNAME:sa1}}
spring.datasource.password=${REPORT_DB_PASSWORD:${DB_PASSWORD:123456}}
spring.datasource.driver-class-name=${REPORT_DB_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

# Keep the pool bounded and fail clearly when the database cannot be reached.
spring.datasource.hikari.maximum-pool-size=${REPORT_DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${REPORT_DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${REPORT_DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${REPORT_DB_VALIDATION_TIMEOUT_MS:5000}

spring.jackson.serialization.write-dates-as-timestamps=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
